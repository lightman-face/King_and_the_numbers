<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>七王五二三</title>
  <style>
    :root{--felt:#123d2d;--dark:#09271e;--gold:#d9ad43;--paper:#fffdf5;--red:#cf3434}
    *{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 50% 20%,#1d6247,var(--felt) 55%,#08231b);color:#fff;font-family:"Microsoft YaHei UI",system-ui,sans-serif;min-height:100vh}
    header{text-align:center;background:#071f18cc;padding:18px;border-bottom:2px solid #987a34}h1{margin:0;color:#efc75f;letter-spacing:.25em;font-size:clamp(25px,5vw,40px)}
    main{max-width:1050px;margin:auto;padding:22px}.panel{background:#0a2b21e8;border:1px solid #967b3d;border-radius:16px;padding:24px;box-shadow:0 14px 45px #0005}.hidden{display:none!important}
    .lobby{max-width:560px;margin:6vh auto}.tabs{display:flex;gap:10px;margin:20px 0}.tabs button{flex:1}.form{display:grid;gap:13px}input{font:inherit;padding:13px;border:2px solid #c5b78e;border-radius:9px;background:#fff;color:#222;text-transform:uppercase}
    button{font:inherit;font-weight:700;color:white;border:0;border-radius:9px;padding:12px 19px;background:#b98120;cursor:pointer;transition:.15s}button:hover:not(:disabled){transform:translateY(-2px);filter:brightness(1.12)}button:disabled{opacity:.42;cursor:not-allowed}.danger{background:#983e35}.secondary{background:#365d70}
    .topline,.stats,.actions{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}.room-code{font-size:25px;color:#ffd76f;letter-spacing:.18em}.notice{text-align:center;font-size:clamp(16px,3vw,22px);font-weight:bold;margin:22px 0;min-height:32px}.stats{background:#071f18aa;border-radius:10px;padding:12px 16px;color:#e5dcc5}
    .table{min-height:155px;border:2px solid #92763a;border-radius:14px;background:#08281e;margin:18px 0;display:flex;align-items:center;justify-content:center;text-align:center;padding:16px}.played{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
    .hand{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;min-height:155px;padding:18px 0}.card{width:92px;height:132px;background:var(--paper);color:#1c2223;border:3px solid #ddd2b7;border-radius:10px;font-size:20px;box-shadow:0 5px 9px #0006}.card.red{color:var(--red)}.card.selected{transform:translateY(-14px);border-color:#ffd154;background:#fff0b8}.card:hover{transform:translateY(-6px)}.card.selected:hover{transform:translateY(-14px)}
    .actions{justify-content:center}.parity{text-align:center;padding:22px}.parity button{margin:8px;font-size:18px}.die{font-size:60px;margin:8px}.waiting{text-align:center;padding:45px 10px;color:#ddcfaa}.error{background:#9d3636;border-radius:8px;padding:10px;margin:10px 0}.result{text-align:center;color:#ffd366;font-size:25px;font-weight:bold;padding:20px}
    @media(max-width:600px){main{padding:10px}.panel{padding:14px}.card{width:66px;height:100px;font-size:16px}.room-code{font-size:19px}}
  </style>
</head>
<body>
<header><h1>♠ 七王五二三 ♥</h1></header>
<main>
  <section id="lobby" class="panel lobby">
    <h2>双人在线对战</h2><p>创建房间并把六位房间码发给朋友，或输入朋友分享的房间码。</p>
    <div id="lobbyError" class="error hidden"></div>
    <div class="tabs"><button onclick="showForm('create')">创建房间</button><button class="secondary" onclick="showForm('join')">加入房间</button></div>
    <div id="createForm" class="form"><input id="createName" maxlength="12" placeholder="你的昵称"><button onclick="createRoom()">创建新房间</button></div>
    <div id="joinForm" class="form hidden"><input id="joinName" maxlength="12" placeholder="你的昵称"><input id="joinCode" maxlength="6" placeholder="六位房间码"><button onclick="joinRoom()">进入房间</button></div>
  </section>
  <section id="game" class="panel hidden">
    <div class="topline"><div>房间码：<strong id="code" class="room-code"></strong></div><button class="secondary" onclick="copyInvite()">复制邀请信息</button></div>
    <div id="error" class="error hidden"></div><div id="notice" class="notice"></div>
    <div class="stats"><span id="players"></span><span id="deck"></span><span id="scores"></span></div>
    <div id="table" class="table"></div><div id="controls"></div>
    <div id="hand" class="hand"></div>
    <div class="actions"><button id="playBtn" onclick="playCards()">出牌</button><button id="passBtn" class="danger" onclick="passTurn()">放弃本回合</button></div>
  </section>
</main>
<script>
let auth=null,state=null,selected=new Set(),poller=null;
const $=id=>document.getElementById(id);
function showForm(which){$('createForm').classList.toggle('hidden',which!=='create');$('joinForm').classList.toggle('hidden',which!=='join')}
async function api(path,data={}){const res=await fetch('/api/'+path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({...auth,...data})});const out=await res.json();if(!out.ok)throw new Error(out.error);return out}
function lobbyError(e){$('lobbyError').textContent=e.message;$('lobbyError').classList.remove('hidden')}
async function createRoom(){try{const out=await api('create',{name:$('createName').value});enter(out)}catch(e){lobbyError(e)}}
async function joinRoom(){try{const out=await api('join',{name:$('joinName').value,code:$('joinCode').value});enter(out)}catch(e){lobbyError(e)}}
function enter(out){auth={code:out.code,token:out.token};sessionStorage.setItem('q7523',JSON.stringify(auth));$('lobby').classList.add('hidden');$('game').classList.remove('hidden');$('code').textContent=out.code;refresh();poller=setInterval(refresh,900)}
async function refresh(){if(!auth)return;try{const out=await api('state');const changed=!state||state.version!==out.state.version;state=out.state;if(changed){selected.clear();render()}hideError()}catch(e){showError(e.message)}}
function card(c,i,clickable=true){return `<button class="card ${c.red?'red':''} ${selected.has(i)?'selected':''}" ${clickable?`onclick="toggle(${i})"`:''}>${c.label}</button>`}
function render(){
 $('notice').textContent=state.notice;$('players').textContent=state.players.map((p,i)=>`${i===state.you?'你':'对手'}：${p||'等待加入'}（${state.handCounts[i]}张）`).join('　');$('deck').textContent=`牌堆：${state.deckCount} 张`;$('scores').textContent=`得分：${state.scores[0]} : ${state.scores[1]}`;
 $('controls').innerHTML='';$('hand').innerHTML='';let table='本回合尚未出牌';if(state.lastPlay)table=`<div><div>${state.current===state.you?'等待出牌':'等待对手操作'} · 上手牌型：${state.lastPlay.kind}</div><div class="played">${state.lastPlay.cards.map(c=>card(c,0,false)).join('')}</div></div>`;$('table').innerHTML=table;
 if(state.phase==='waiting'){$('controls').innerHTML='<div class="waiting">房间已创建，正在等待第二名玩家加入……<br>请分享上方房间码</div>'}
 else if(state.phase==='parity'){$('controls').innerHTML='<div class="parity"><div class="die">🎲</div><p>抢先选择后，另一名玩家自动获得另一项</p><button onclick="chooseParity(1)">选择奇数</button><button onclick="chooseParity(0)">选择偶数</button></div>'}
 else if(state.phase==='finished'){$('controls').innerHTML=`<div class="result">${state.result}</div><div class="actions"><button onclick="restart()">再来一局</button></div>`}
 if(state.phase==='playing')$('hand').innerHTML=state.hand.map((c,i)=>card(c,i)).join('');
 const turn=state.phase==='playing'&&state.current===state.you;$('playBtn').disabled=!turn;$('passBtn').disabled=!turn;$('playBtn').classList.toggle('hidden',state.phase!=='playing');$('passBtn').classList.toggle('hidden',state.phase!=='playing');
}
function toggle(i){selected.has(i)?selected.delete(i):selected.add(i);render()}
async function act(path,data={}){try{const out=await api(path,data);state=out.state;selected.clear();render();hideError()}catch(e){showError(e.message)}}
function chooseParity(parity){act('parity',{parity})}function playCards(){act('play',{indexes:[...selected]})}function passTurn(){act('pass')}function restart(){act('restart')}
function showError(text){$('error').textContent=text;$('error').classList.remove('hidden')}function hideError(){$('error').classList.add('hidden')}
async function copyInvite(){const text=`来玩七王五二三：${location.origin}\n房间码：${state.code}`;try{await navigator.clipboard.writeText(text);$('notice').textContent='邀请信息已复制'}catch{prompt('复制下面的邀请信息',text)}}
window.addEventListener('load',()=>{try{const saved=JSON.parse(sessionStorage.getItem('q7523'));if(saved?.code&&saved?.token){auth=saved;$('lobby').classList.add('hidden');$('game').classList.remove('hidden');$('code').textContent=auth.code;refresh();poller=setInterval(refresh,900)}}catch{}})
</script>
</body></html>
